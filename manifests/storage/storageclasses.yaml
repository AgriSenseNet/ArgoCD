apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: kafka-gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  iops: "3000"
  throughput: "250"
  encrypted: "true"
  fsType: xfs
reclaimPolicy: Retain       # Retain PVs when PVCs are deleted (data safety)
volumeBindingMode: WaitForFirstConsumer  # Schedule pod first, then provision in correct AZ
allowVolumeExpansion: true

---
# Default StorageClass for non-Kafka workloads
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard-gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
