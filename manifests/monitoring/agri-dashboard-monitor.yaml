apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agri-dashboard-nginx
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - agri-dashboard
  selector:
    matchLabels:
      app.kubernetes.io/name: agri-dashboard
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
