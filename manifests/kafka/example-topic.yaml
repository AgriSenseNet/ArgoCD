apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: example-topic
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: "604800000"        # 7 days
    segment.bytes: "1073741824"      # 1 GiB
    min.insync.replicas: "1"
    compression.type: lz4
