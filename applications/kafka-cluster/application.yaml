apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Deploy after Strimzi operator is ready
spec:
  project: default
  source:
    repoURL: https://github.com/AgriSenseNet/ArgoCD.git
    targetRevision: main
    path: manifests/kafka
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: false   # NEVER auto-prune Kafka — prevents accidental data loss
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: kafka.strimzi.io
      kind: Kafka
      jsonPointers:
        - /status
        - /metadata/annotations
    - group: kafka.strimzi.io
      kind: KafkaNodePool
      jsonPointers:
        - /status
        - /metadata/annotations
        - /metadata/labels
        - /spec/storage
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
        - /metadata/finalizers
