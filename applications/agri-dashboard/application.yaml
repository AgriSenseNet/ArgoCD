apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agri-dashboard
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/AgriSenseNet/ArgoCD.git
    path: manifests/agri-dashboard
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: agri-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
