apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # StorageClass must exist before Kafka PVCs
spec:
  project: default
  source:
    repoURL: https://github.com/AgriSenseNet/ArgoCD.git
    targetRevision: main
    path: manifests/storage
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
