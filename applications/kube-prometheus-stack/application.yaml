apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "62.3.1"
    helm:
      values: |
        prometheus:
          prometheusSpec:
            replicas: 1
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: standard-gp3
                  resources:
                    requests:
                      storage: 100Gi
            resources:
              requests:
                cpu: "500m"
                memory: "2Gi"
              limits:
                memory: "4Gi"
            # Pick up ServiceMonitors/PodMonitors from all namespaces regardless of labels
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            podMonitorNamespaceSelector: {}

        grafana:
          replicas: 1
          adminPassword: "change-me-immediately"
          persistence:
            enabled: true
            storageClassName: standard-gp3
            size: 10Gi
          additionalDataSources:
            - name: Strimzi Kafka
              type: prometheus
              url: http://prometheus-operated.monitoring.svc:9090
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: imported
                  orgId: 1
                  folder: "Imported"
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/imported
          dashboards:
            imported:
              nginx:
                gnetId: 12708
                revision: 1
                datasource: Prometheus
              postgresql:
                gnetId: 9628
                revision: 7
                datasource: Prometheus
              istio-control-plane:
                gnetId: 7645
                revision: 226
                datasource: Prometheus
              istio-mesh:
                gnetId: 7636
                revision: 226
                datasource: Prometheus
              cert-manager:
                gnetId: 20842
                revision: 3
                datasource: Prometheus
              kafka-strimzi:
                gnetId: 7589
                revision: 5
                datasource: Prometheus
              keycloak:
                gnetId: 19659
                revision: 1
                datasource: Prometheus

        # Recording rules and alerts
        additionalPrometheusRulesMap:
          kafka-rules:
            groups:
              - name: kafka.rules
                rules:
                  - alert: KafkaUnderReplicatedPartitions
                    expr: kafka_server_replicamanager_underreplicatedpartitions > 0
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Kafka has under-replicated partitions"
                      description: "{{ $labels.instance }} has {{ $value }} under-replicated partitions"
                  - alert: KafkaActiveControllerCount
                    expr: kafka_controller_kafkacontroller_activecontrollercount != 1
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "No active Kafka controller"
          istio-rules:
            groups:
              - name: istio.rules
                rules:
                  - alert: IstioHighRequestLatency
                    expr: histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket[5m])) by (le, destination_service)) > 1000
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "High p99 latency on {{ $labels.destination_service }}"
                      description: "p99 latency is {{ $value }}ms"
                  - alert: IstioHighErrorRate
                    expr: sum(rate(istio_requests_total{response_code=~"5.*"}[5m])) by (destination_service) / sum(rate(istio_requests_total[5m])) by (destination_service) > 0.05
                    for: 5m
                    labels:
                      severity: critical
                    annotations:
                      summary: "High 5xx error rate on {{ $labels.destination_service }}"
                      description: "Error rate is {{ $value | humanizePercentage }}"
                  - alert: IstiodUnavailable
                    expr: up{job="istiod"} == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "istiod is down"
          postgres-rules:
            groups:
              - name: postgres.rules
                rules:
                  - alert: PostgresDown
                    expr: pg_up == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "PostgreSQL is down"
                  - alert: PostgresHighConnections
                    expr: sum(pg_stat_activity_count) by (instance) > 80
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "PostgreSQL high connection count on {{ $labels.instance }}"
                  - alert: PostgresReplicationLag
                    expr: pg_replication_lag > 30
                    for: 5m
                    labels:
                      severity: warning
                    annotations:
                      summary: "PostgreSQL replication lag > 30s"
          certmanager-rules:
            groups:
              - name: certmanager.rules
                rules:
                  - alert: CertificateExpiringSoon
                    expr: certmanager_certificate_expiration_timestamp_seconds - time() < 7 * 24 * 3600
                    for: 1h
                    labels:
                      severity: warning
                    annotations:
                      summary: "Certificate {{ $labels.name }} expires in less than 7 days"
                  - alert: CertificateNotReady
                    expr: certmanager_certificate_ready_status{condition="True"} == 0
                    for: 10m
                    labels:
                      severity: critical
                    annotations:
                      summary: "Certificate {{ $labels.name }} is not ready"
                  - alert: CertManagerDown
                    expr: up{job="cert-manager"} == 0
                    for: 1m
                    labels:
                      severity: critical
                    annotations:
                      summary: "cert-manager is down"

        alertmanager:
          enabled: true
          alertmanagerSpec:
            replicas: 1

        prometheusOperator:
          replicas: 1

        kube-state-metrics:
          replicas: 1

        prometheus-node-exporter: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
