apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi-kafka-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"  # Install operator before Kafka CRs
spec:
  project: default
  source:
    repoURL: quay.io/strimzi-helm
    chart: strimzi-kafka-operator
    targetRevision: "0.45.2"
    helm:
      values: |
        watchNamespaces:
          - kafka
        replicas: 1
        logLevel: INFO
        resources:
          requests:
            cpu: "200m"
            memory: "384Mi"
          limits:
            memory: "768Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: strimzi-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
